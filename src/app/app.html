
<div *ngIf="vm$ | async as vm" class="flex flex-col w-full min-w-full min-h-screen">
    @if (routeLoading) {
    <div class="loading-overlay fixed inset-0 z-[999] bg-white flex flex-col items-center justify-center gap-4 overflow-hidden">
      <div class="w-12 h-12 bg-orange-600 rounded-2xl flex items-center justify-center">
        <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
        </svg>
      </div>
      <div class="flex flex-col items-center gap-1">
        <p class="text-sm font-semibold text-gray-700">Passio</p>
        <p class="text-xs text-gray-400">Loading, please wait...</p>
      </div>
      <!-- Animated dots -->
      <div class="flex gap-1.5">
        <span class="w-2 h-2 rounded-full bg-orange-600 animate-bounce [animation-delay:0ms]"></span>
        <span class="w-2 h-2 rounded-full bg-orange-600 animate-bounce [animation-delay:150ms]"></span>
        <span class="w-2 h-2 rounded-full bg-orange-600 animate-bounce [animation-delay:300ms]"></span>
      </div>
    </div>
  }

  <div class="flex flex-1 w-full">
    @if (vm.isAuthenticated && (vm.userRole === 'admin' || vm.userRole === 'cashier' || vm.userRole === 'driver')) {
       <!-- Overlay backdrop — mobile only, shown when sidenav is open -->
      <div
        *ngIf="sidenavOpened"
        class="fixed inset-0 bg-black/40 z-30 md:hidden"
        (click)="toggleSidenav()">
      </div>

      <div 
        class="z-50" (mouseenter)="handleMouseEnter()" (mouseleave)="handleMouseLeave()">
        <app-sidenav class="fixed h-[100vh] bg-white z-40" [sidenavOpened]="sidenavOpened"
          [isPeeking]="isPeeking" (closeNav)="onCloseNav()"></app-sidenav>

        <p-button class="fixed z-50 transition-all top-4 duration-3 00"
          [ngClass]="sidenavOpened || (isPeeking && !sidenavOpened) ? 'left-[calc(265px-26.25px/2)]' : 'left-0.5'"
          (onClick)="toggleSidenav()" [icon]="(sidenavOpened || isPeeking) ? 'fas fa-chevron-left' : 'fas fa-chevron-right'"
          [rounded]="true" [outlined]="false" styleClass="!w-6 !h-6 !p-0 !bg-orange-600 !border-orange-600 !hover:bg-orange-700 !hover:border-orange-700 !text-white"
          [pTooltip]="(sidenavOpened || isPeeking) ? 'Collapse sidebar' : 'Expand sidebar'" />
    </div>
    }

    <div class="flex flex-col flex-1 transition-all duration-300" [ngClass]="{
      'md:ml-[265px]':  (sidenavOpened || isPeeking) && (vm.userRole === 'admin' || vm.userRole === 'cashier' || vm.userRole === 'driver'),
      'md:ml-4': !sidenavOpened && !isPeeking && (vm.userRole === 'admin' || vm.userRole === 'cashier' || vm.userRole === 'driver'),
      'ml-0': true
    }">
      @if (!(vm.userRole === 'admin' || vm.userRole === 'cashier' || vm.userRole === 'driver')) {
        <app-header class="sticky top-0 z-30 w-full"></app-header>
      }

      <main class="flex-1 w-full min-h-[calc(100vh-89px)]">
        <router-outlet></router-outlet>
      </main>
    </div>
  </div>

  <p-toast>
  </p-toast>
  <p-confirmDialog  [style]="{ width: '32rem' }"
  styleClass="rounded-2xl overflow-hidden shadow-2xl border-0" />

</div>
