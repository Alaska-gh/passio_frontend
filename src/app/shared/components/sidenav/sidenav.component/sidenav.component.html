<div
  class="flex flex-col h-screen bg-white border-r border-gray-200 shadow-sm transition-all duration-300"
  [ngClass]="sidenavOpened || isPeeking ? ' w-[265px]' : 'w-5'">
  <!-- LOGO -->
   <div class="flex items-center gap-3 px-5 py-5 border-b border-gray-100" [hidden]="!sidenavOpened && !isPeeking">
      <div class="w-9 h-9 bg-orange-600 rounded-xl flex items-center justify-center flex-shrink-0">
        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4" />
        </svg>
      </div>
      <div>
        <p class="text-sm font-bold text-gray-800 leading-tight">Passio</p>
        <p class="text-xs text-gray-400">Cashier Portal</p>
      </div>
    </div>

 <!-- Nav -->
    <nav class="flex-1 px-3 py-4 space-y-1">
      @if (sidenavOpened || isPeeking) {
        <a *ngFor="let item of navItems"
        [routerLink]="item.routerLink"
        [ngClass]="isActive(item.routerLink)
          ? 'bg-orange-50 text-orange-700 font-semibold'
          : 'text-gray-600 hover:bg-gray-50'"
        class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm transition-colors" >
         <!-- Grid icon -->
        <ng-container *ngIf="item.icon === 'grid'">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" />
          </svg>
        </ng-container>

        <!-- Ticket icon -->
        <ng-container *ngIf="item.icon === 'ticket'">
          <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z" />
          </svg>
        </ng-container>
            {{ item.label }}
      </a>
      }
    </nav>

  <!-- FOOTER / USER -->
  <div class="border-t border-gray-100 p-4" [hidden]="!sidenavOpened && !isPeeking">
    <div *ngIf="user" class="flex items-center gap-3">
      <div
        class="w-8 h-8 bg-orange-100 rounded-full flex items-center justify-center flex-shrink-0">
        <i class="fas fa-user text-orange-700"></i>
      </div>
      <div *ngIf="sidenavOpened || isPeeking" class="min-w-0">
        <p class="text-sm font-semibold text-gray-800 truncate">
          {{ user.name || 'Cashier' }}
        </p>
        <p class="text-xs text-gray-400 truncate">
          {{ user.phone }}
        </p>

      </div>

    </div>
    <button (click)="logout()"
        class="w-full flex items-center gap-2 text-sm text-red-500 hover:text-red-700 px-2 py-2 rounded-lg hover:bg-red-50 transition-colors">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
        </svg>
        Sign Out
      </button>
  </div>

</div>
