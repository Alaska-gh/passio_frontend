<div class="flex flex-col gap-4 p-2">
  <p class="text-sm text-gray-500">
    You are signing off from <strong>{{ bus?.plateNumber }}</strong>.
    Choose how you want to sign off.
  </p>

  <!-- Mode selector -->
  <div class="grid grid-cols-2 gap-2">
    <button
      (click)="mode = 'resign'"
      [class.border-orange-500]="mode === 'resign'"
      [class.bg-orange-50]="mode === 'resign'"
      [class.text-orange-700]="mode === 'resign'"
      [class.border-gray-200]="mode !== 'resign'"
      [class.text-gray-500]="mode !== 'resign'"
      class="flex flex-col items-center gap-1.5 border rounded-xl p-3 text-xs font-semibold transition-colors">
      <i class="fas fa-sign-out text-base"></i>
      Resign
      <span class="text-xs font-normal text-gray-400 text-center">
        Resign from bus
      </span>
    </button>
    <button
      (click)="mode = 'handover'"
      [class.border-orange-500]="mode === 'handover'"
      [class.bg-orange-50]="mode === 'handover'"
      [class.text-orange-700]="mode === 'handover'"
      [class.border-gray-200]="mode !== 'handover'"
      [class.text-gray-500]="mode !== 'handover'"
      class="flex flex-col items-center gap-1.5 border rounded-xl p-3 text-xs font-semibold transition-colors">
      <i class="fas fa-user-edit text-base"></i>
      Hand over
      <span class="text-xs font-normal text-gray-400 text-center">
        Pass bus to a spare driver
      </span>
    </button>
  </div>

  <!-- Leave mode -->
  @if (mode === 'resign') {
    <div class="bg-orange-50 border border-orange-100 rounded-xl px-4 py-3 text-sm text-orange-700">
      <i class="fas fa-info-circle mr-1.5"></i>
      Resign from this bus permenantly.
      You or another driver can sign on later.
    </div>
    <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
      <p-button label="Cancel" severity="secondary" (onClick)="cancel()" />
      <p-button
        label="Confirm Resign"
        icon="fas fa-sign-out"
        [loading]="saving"
        styleClass="bg-orange-600! border-orange-600! text-white!"
        (onClick)="resign()" />
    </div>
  }

  <!-- Handover mode -->
  @if (mode === 'handover') {
    <div class="flex flex-col gap-1.5">
      <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">
        Driver taking over
      </label>
      <p-select
        [(ngModel)]="selectedDriverId"
        [options]="drivers"
        optionLabel="name"
        optionValue="uid"
        placeholder="Select a driver"
        [filter]="true"
        filterBy="name"
        [loading]="loading"
        styleClass="w-full">
        <ng-template pTemplate="item" let-driver>
          <div class="flex flex-col">
            <span class="text-sm">{{ driver.name }}</span>
            <span class="text-xs text-gray-400">{{ driver.phone }}</span>
          </div>
        </ng-template>
      </p-select>
    </div>
    <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
      <p-button label="Cancel" severity="secondary" (onClick)="cancel()" />
      <p-button
        label="Hand Over"
        icon="fas fa-user-edit"
        [disabled]="!selectedDriverId"
        [loading]="saving"
        styleClass="bg-orange-600! border-orange-600! text-white!"
        (onClick)="handover()" />
    </div>
  }

</div>
