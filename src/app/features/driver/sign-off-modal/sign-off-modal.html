   <div class="flex flex-col gap-4 p-2">
      <p class="text-sm text-gray-500">
        You are signing off from <strong>{{ bus?.plateNumber }}</strong>.
        Select the driver taking over.
      </p>

      <div class="flex flex-col gap-1.5">
        <label class="text-xs font-semibold text-gray-500 uppercase tracking-wide">New driver</label>
        <p-select
          [(ngModel)]="selectedDriverId"
          [options]="drivers"
          optionLabel="displayName"
          optionValue="id"
          placeholder="Select a driver"
          [filter]="true"
          filterBy="displayName"
          [loading]="loading"
          styleClass="w-full" >
          <ng-template pTemplate="item" let-driver>
            <div class="flex flex-col">
              <span class="text-sm">{{ driver.firstname }} {{ driver.lastname }}</span>
              <span class="text-xs text-gray-400">{{ driver.phone }}</span>
            </div>
          </ng-template>
        </p-select>
      </div>

      <div class="flex justify-end gap-2 pt-2 border-t border-gray-100">
        <p-button label="Cancel" severity="secondary" (onClick)="cancel()" />
        <p-button
          label="Confirm Sign Off"
          [disabled]="!selectedDriverId"
          [loading]="saving"
          styleClass="bg-orange-600! border-orange-600! text-white!"
          (onClick)="confirm()" />
      </div>
    </div>
